name: Deploy PHANTOM

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  DEPLOY_DIR: /mnt/docker/phantom

jobs:
  deploy:
    runs-on: self-hosted
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Sync to deploy directory
        run: |
          rsync -a --delete \
            --exclude='.env' \
            --exclude='results/' \
            --exclude='node_modules/' \
            --exclude='.next/' \
            --exclude='__pycache__/' \
            ${{ github.workspace }}/ $DEPLOY_DIR/

      - name: Build Docker images
        run: |
          cd $DEPLOY_DIR
          docker compose build backend celery_worker frontend

      - name: Deploy
        run: |
          cd $DEPLOY_DIR
          docker compose up -d
          docker compose restart nginx

      - name: Health check
        run: |
          sleep 10
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost/api/health || echo "000")
          if [ "$STATUS" = "200" ]; then
            echo "Deploy OK - API responding"
          else
            echo "WARNING: API returned $STATUS (may still be starting)"
          fi

      - name: Show status
        if: always()
        run: |
          cd $DEPLOY_DIR
          docker compose ps
          echo "---"
          docker compose logs --tail 5 backend celery_worker 2>&1 | tail -20
